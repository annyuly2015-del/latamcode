<svg 
  viewBox="0 0 510 200" 
  xmlns="http://www.w3.org/2000/svg"
  width="100%"
  height="100%"
>
  {/* 1. Isotype (Left) - Symmetrical, hollow rings, clean geometry */}
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    {/* Left Branch */}
    <path d="M75,40 L25,90 L25,110 L75,160" />
    <circle cx="75" cy="40" r="10" stroke="#ffffff" stroke-width="6" fill="none" />
    <circle cx="75" cy="160" r="10" stroke="#ffffff" stroke-width="6" fill="none" />
    
    {/* Left Ticks */}
    <line x1="58" y1="62" x2="48" y2="72" stroke-width="4.5" />
    <line x1="48" y1="128" x2="58" y2="138" stroke-width="4.5" />
    
    {/* Inner Left Bracket < */}
    <path d="M86,85 L72,100 L86,115" stroke-width="5" />
    
    {/* Slash */}
    <line x1="106" y1="80" x2="94" y2="120" stroke-width="6" />
    
    {/* Inner Right Bracket > */}
    <path d="M114,85 L128,100 L114,115" stroke-width="5" />
    
    {/* Right Branch */}
    <path d="M125,40 L175,90 L175,110 L125,160" />
    <circle cx="125" cy="40" r="10" stroke="#ffffff" stroke-width="6" fill="none" />
    <circle cx="125" cy="160" r="10" stroke="#ffffff" stroke-width="6" fill="none" />
    
    {/* Right Ticks */}
    <line x1="142" y1="62" x2="152" y2="72" stroke-width="4.5" />
    <line x1="152" y1="128" x2="142" y2="138" stroke-width="4.5" />
  </g>

  {/* 2. Wordmark "LATAM CODE" - High-contrast stylized typography */}
  <g stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    {/* L */}
    <path d="M215,65 L215,135 L235,135" />
    
    {/* A (First) */}
    <path d="M245,135 L255,65 L265,135" />
    <circle cx="255" cy="112" r="3.5" fill="#ffffff" stroke="none" />
    
    {/* T */}
    <path d="M275,65 L295,65" />
    <line x1="285" y1="65" x2="285" y2="135" />
    
    {/* A (Second) */}
    <path d="M305,135 L315,65 L325,135" />
    <circle cx="315" cy="112" r="3.5" fill="#ffffff" stroke="none" />
    
    {/* M */}
    <path d="M335,135 L335,65 L348,120 L361,65 L361,135" />
    
    {/* C */}
    <path d="M405,65 L392,65 A 7,7 0 0 0 385,72 L385,128 A 7,7 0 0 0 392,135 L405,135" />
    
    {/* O */}
    <path d="M420,65 L428,65 A 7,7 0 0 1 435,72 L435,128 A 7,7 0 0 1 428,135 L420,135 A 7,7 0 0 1 413,128 L413,72 A 7,7 0 0 1 420,65 Z" />
    <circle cx="424" cy="100" r="3.5" fill="#ffffff" stroke="none" />
    
    {/* D */}
    <path d="M443,65 L453,65 A 7,7 0 0 1 460,72 L460,128 A 7,7 0 0 1 453,135 L443,135" />
    <line x1="443" y1="65" x2="443" y2="135" />
    
    {/* E */}
    <path d="M488,65 L475,65 A 7,7 0 0 0 468,72 L468,128 A 7,7 0 0 0 475,135 L488,135" />
    <circle cx="494" cy="100" r="3.5" fill="#ffffff" stroke="none" />
  </g>
</svg>
